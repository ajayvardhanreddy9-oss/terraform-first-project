<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            padding: 60px 40px;
            text-align: center;
        }

        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 20px;
            line-height: 1;
        }

        .error-title {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .error-message {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-details {
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            padding: 15px 20px;
            margin: 30px 0;
            text-align: left;
            border-radius: 4px;
        }

        .error-details p {
            font-size: 14px;
            color: #555;
            margin: 8px 0;
            font-family: 'Courier New', monospace;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
            transform: translateY(-2px);
        }

        .error-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .error-container {
                padding: 40px 20px;
            }

            .error-code {
                font-size: 80px;
            }

            .error-title {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">⚠️</div>
        <div class="error-code" id="errorCode">404</div>
        <div class="error-title" id="errorTitle">Page Not Found</div>
        <div class="error-message" id="errorMessage">
            We're sorry, but the page you're looking for doesn't exist or has been moved.
        </div>
        
        <div class="error-details">
            <p><strong>Error Details:</strong></p>
            <p id="errorDetails">The requested resource could not be found on this server.</p>
            <p><strong>Timestamp:</strong> <span id="timestamp"></span></p>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="goHome()">Go to Home</button>
            <button class="btn btn-secondary" onclick="goBack()">Go Back</button>
        </div>
    </div>

    <script>
        // Set timestamp
        document.getElementById('timestamp').textContent = new Date().toLocaleString();

        // Function to go back
        function goBack() {
            window.history.back();
        }

        // Function to go home
        function goHome() {
            window.location.href = '/';
        }

        // Optional: Parse query parameters to customize error message
        const urlParams = new URLSearchParams(window.location.search);
        const errorCode = urlParams.get('code') || '404';
        const errorTitle = urlParams.get('title') || 'Page Not Found';
        const errorMessage = urlParams.get('message') || 'We\'re sorry, but the page you\'re looking for doesn\'t exist or has been moved.';

        document.getElementById('errorCode').textContent = errorCode;
        document.getElementById('errorTitle').textContent = errorTitle;
        document.getElementById('errorMessage').textContent = errorMessage;
    </script>
</body>
</html>
